format:
  hebstr-doc-html:
    page-layout: article
    embed-resources: false
    include-after-body:
      - _extensions/hebstr-book/restore-toggle.html
    grid:
      sidebar-width: 350px
      body-width: 1100px
      margin-width: 350px
      gutter-width: 1rem
    theme:
      light:
        - _extensions/hebstr-book/theme-extras-base.scss
        - _extensions/hebstr-book/theme-extras-light.scss
      dark:
        - _extensions/hebstr-book/theme-extras-base.scss
        - _extensions/hebstr-book/theme-extras-dark.scss
