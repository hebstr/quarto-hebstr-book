<script>
// hebstr-doc ships toggle-position.html which moves the color-scheme toggle
// from the sidebar into the chapter H1 (designed for single-doc HTML).
// In a book, we want the toggle to stay in the sidebar — its natural home.
// This counter-script runs after hebstr-doc's and moves the toggle back.
(function () {
  function restoreToggle() {
    var toggle = document.querySelector('.quarto-color-scheme-toggle');
    var sidebarTools = document.querySelector('#quarto-sidebar .sidebar-tools-main');
    if (!toggle || !sidebarTools) return false;
    if (toggle.parentNode === sidebarTools) return true;
    toggle.classList.remove('hebstr-title-toggle');
    sidebarTools.appendChild(toggle);
    return true;
  }
  function tryRestore(retries) {
    if (restoreToggle()) return;
    if (retries <= 0) return;
    requestAnimationFrame(function () { tryRestore(retries - 1); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () { tryRestore(30); });
  } else {
    tryRestore(30);
  }
})();
</script>
